    const quizForm = document.getElementById("quizForm");

    questions.forEach((item, index) => {
      const card = document.createElement("div");
      card.className = "question-card";

      let html = `<div class="question-title">${item.q}</div><div class="options">`;

      item.options.forEach((option, optIndex) => {
        html += `
          <label>
            <input type="radio" name="q${index}" value="${optIndex}">
            ${option}
          </label>
        `;
      });

      html += `</div>`;
      card.innerHTML = html;
      quizForm.appendChild(card);
    });

    function corrigirQuiz() {
      let acertos = 0;
      let reviewHTML = "";

      questions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const userAnswer = selected ? Number(selected.value) : null;
        const acertou = userAnswer === item.answer;

        if (acertou) acertos++;

        reviewHTML += `
          <div class="review-item ${acertou ? "correct" : "wrong"}">
            <h3>${item.q}</h3>
            <div class="answer">Sua resposta: ${userAnswer !== null ? item.options[userAnswer] : "Não respondida"}</div>
            <div class="answer">Resposta correta: <span class="green">${item.options[item.answer]}</span></div>
            <div class="answer">Resultado: ${acertou ? "<span class='green'>Acertou</span>" : "<span class='red'>Errou</span>"}</div>
            <div class="explanation"><strong>Por quê?</strong> ${item.why}</div>
          </div>
        `;
      });

      const total = questions.length;
      const porcentagem = Math.round((acertos / total) * 100);
      const erros = total - acertos;

      document.getElementById("scoreText").innerHTML = `Você acertou ${acertos} de ${total} questões (${porcentagem}%). Errou ${erros}.`;
      document.getElementById("review").innerHTML = reviewHTML;
      document.getElementById("resultBox").style.display = "block";

      window.scrollTo({ top: document.getElementById("resultBox").offsetTop, behavior: "smooth" });
    }

    function reiniciarQuiz() {
      document.querySelectorAll("input[type='radio']").forEach(input => input.checked = false);
      document.getElementById("resultBox").style.display = "none";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
